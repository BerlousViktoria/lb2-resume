<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger menu</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="container">
        <div class="left-side">
            <div class="burger-text">
                <p>БУРГЕР-</p>
                <p>ITALIAN</p>
                <p>!</p>
                <p id="small-text">УСЬОГО 79 ГРН</p>
            </div>
        </div>        
        <div class="right-side">
            <div class="title">Лови момент!</div>
            <div class="menu">
                <div class="menu-item">
                    <p class="name">MICHIGAN</p>
                    <p class="price">64.00 ГРН</p>
                </div>
                <div class="menu-item">
                    <p class="name">Beef BBQ</p>
                    <p class="price">59.00 ГРН</p>
                </div>
                <div class="menu-item">
                    <p class="name">Cheesburger</p>
                    <p class="price">59.00 ГРН</p>
                </div>
                <div class="menu-item">
                    <p class="name">KETCHUP ROOM</p>
                    <p class="price">68.00 ГРН</p>
                </div>
                <div class="menu-item">
                    <p class="name">KETCHUP ROOM2</p>
                    <p class="price">72.00 ГРН</p>
                </div>
                <div class="menu-item">
                    <p class="name">ELVIS</p>
                    <p class="price">55.00 ГРН</p>
                </div>                                                                                              
            </div>
        </div>
    </div>
    <div class="button">
        <a href="#">ВСЕ МЕНЮ</a>
    </div>    
</body>
</html>
