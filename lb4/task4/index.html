<!DOCTYPE html>
<html lang="en">

<head>
    <title>Task 4</title>
    <style>
        div {
            border: 3px black solid;
            margin-bottom: 5px;
            width: 90px;
            height: 30px;
        }

        div::after {
            content: "";
            display: block;
            border: 3px black solid;
            height: 5px;
            margin: 9px;
            margin-left: 90px;
        }

        .battery_low {
            position: relative;
        }

        .battery_low::before {
            background-color: red;
            content: "";
            position: absolute;
            width: 20%;
            height: 100%;
            left: 0;
        }

        .battery_middle {
            position: relative;
        }

        .battery_middle::before {
            background-color: yellow;
            content: "";
            position: absolute;
            width: 50%;
            height: 100%;
            left: 0;
        }

        .battery_full {
            position: relative;
        }

        .battery_full::before {
            background-color: green;
            position: absolute;
            content: "";
            width: 100%;
            height: 100%;
            left: 0;
        }
    </style>
</head>

<body>
    <div class="battery_low"></div>
    <div class="battery_middle"></div>
    <div class="battery_full"></div>
</body>

</html>
